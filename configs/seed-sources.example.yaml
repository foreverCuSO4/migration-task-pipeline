# Example GitHub repository search seed-source configuration.

github_search:
  enabled: true
  # Keep this conservative because GitHub Search API has low per-minute limits.
  per_page: 100
  max_pages_per_query: 10
  sort: stars
  order: desc
  extra_qualifiers:
    - archived:false
    - fork:false
    - stars:>=10
    - pushed:>=2024-01-01
  keywords:
    - torch
    - pytorch
    - cuda
    - triton
    - machine learning
    - deep learning
    - vision
    - graph
    - molecular
    - simulation
    - distributed
    - transformer

goal:
  enabled: true
  target_processed_repos: 10000
  max_search_requests: 100000

github_url_normalization:
  canonical_form: "https://github.com/<owner>/<repo>"
  strip_suffixes:
    - ".git"
  strip_path_prefixes:
    - issues
    - pulls
    - tree
    - blob
